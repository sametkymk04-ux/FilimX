<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmX</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.card {
    background: #222;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width: 100%;
}

.card h3 {
    padding: 10px;
    font-size: 14px;
}

.player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
}

video {
    width: 100%;
    height: 100%;
}

.back {
    position: absolute;
    top: 10px;
    left: 10px;
    background: red;
    padding: 10px;
    border-radius: 5px;
}
</style>
</head>

<body>

<header>🎬 FilmX</header>

<div class="grid">

<div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
<img src="https://picsum.photos/300/200?1">
<h3>Macera Filmi</h3>
</div>

<div class="card" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
<img src="https://picsum.photos/300/200?2">
<h3>Aksiyon Filmi</h3>
</div>

<div class="card" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">
<img src="https://picsum.photos/300/200?3">
<h3>Komedi Filmi</h3>
</div>

<div class="card" onclick="playVideo('https://www.w3schools.com/html/movie.mp4')">
<img src="https://picsum.photos/300/200?4">
<h3>Animasyon</h3>
</div>

</div>

<div class="player" id="player">
<button class="back" onclick="closePlayer()">⬅ Geri</button>
<video id="video" controls autoplay></video>
</div>

<script>
function playVideo(url) {
    document.getElementById("player").style.display = "block";
    let video = document.getElementById("video");
    video.src = url;
    video.play();
}

function closePlayer() {
    let video = document.getElementById("video");
    video.pause();
    document.getElementById("player").style.display = "none";
}
</script>

</body>
</html>
